name: Tests

on: [push, pull_request]

jobs:
  unit:
    name: Unit & threat matrix tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --group dev

      - run: uv run pytest tests/test_unit.py tests/test_threat_matrix.py -v --cov=encrypted_blob_server

  integration:
    name: Integration tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --group dev

      - name: Start server (unix)
        if: runner.os != 'Windows'
        run: |
          FLASK_DEBUG=0 \
          BLOB_SALT=$(python -c "import secrets; print(secrets.token_hex(32))") \
          uv run python -m encrypted_blob_server.app &
          echo $! > server.pid
          sleep 2

      - name: Start server (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $salt = python -c "import secrets; print(secrets.token_hex(32))"
          python -c "
          import subprocess, os, sys, time, socket

          env = os.environ.copy()
          env['BLOB_SALT'] = '$salt'
          env['FLASK_DEBUG'] = '0'

          proc = subprocess.Popen(
              ['uv', 'run', 'python', '-m', 'encrypted_blob_server.app'],
              env=env,
          )
          open('server.pid', 'w').write(str(proc.pid))

          for _ in range(30):
              try:
                  s = socket.create_connection(('127.0.0.1', 5000), timeout=1)
                  s.close()
                  print('Server ready')
                  sys.exit(0)
              except OSError:
                  time.sleep(1)
          print('Server failed to start')
          sys.exit(1)
          "


      - run: uv run pytest tests/test_integration.py -v
        env:
          BASE_URL: http://127.0.0.1:5000

      - name: Stop server (unix)
        if: always() && runner.os != 'Windows'
        run: kill $(cat server.pid)

      - name: Stop server (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          python -c "
          import os, signal
          pid = int(open('server.pid').read())
          os.kill(pid, signal.SIGTERM)
          "