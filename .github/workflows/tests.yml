name: Tests

on: [push, pull_request]

jobs:
  unit:
    name: Unit & threat matrix tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --group dev

      - run: uv run pytest tests/test_unit.py tests/test_threat_matrix.py -v --cov=encrypted_blob_server

  integration:
    name: Integration tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --group dev

      - name: Start server (unix)
        if: runner.os != 'Windows'
        run: |
          FLASK_DEBUG=0 \
          BLOB_SALT=$(python -c "import secrets; print(secrets.token_hex(32))") \
          uv run python -m encrypted_blob_server.app &
          echo $! > server.pid
          sleep 2

      - name: Start server (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $salt = python -c "import secrets; print(secrets.token_hex(32))"
          $salt | Out-File -FilePath server.salt -NoNewline
          $proc = Start-Process -PassThru -NoNewWindow `
            -FilePath "python" `
            -ArgumentList "-m", "encrypted_blob_server.app" `
            -Environment @{ BLOB_SALT = $salt; FLASK_DEBUG = "0"; PATH = $env:PATH }
          $proc.Id | Out-File -FilePath server.pid -NoNewline
          # Poll until port is open
          $timeout = 30; $elapsed = 0
          while ($elapsed -lt $timeout) {
            try {
              $tcp = [System.Net.Sockets.TcpClient]::new("127.0.0.1", 5000)
              $tcp.Close(); break
            } catch {
              Start-Sleep -Seconds 1; $elapsed++
            }
          }
          Write-Host "Server ready after $elapsed seconds"


      - run: uv run pytest tests/test_integration.py -v
        env:
          BASE_URL: http://127.0.0.1:5000

      - name: Stop server (unix)
        if: always() && runner.os != 'Windows'
        run: kill $(cat server.pid)

      - name: Stop server (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: Stop-Process -Id (Get-Content server.pid) -Force