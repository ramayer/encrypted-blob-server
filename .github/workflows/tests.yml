name: Tests

on: [push, pull_request]

jobs:
  unit:
    name: Unit & threat matrix tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --group dev

      - run: uv run pytest tests/test_unit.py tests/test_threat_matrix.py -v --cov=encrypted_blob_server

  integration:
    name: Integration tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --group dev

      - name: Start server (unix)
        if: runner.os != 'Windows'
        run: |
          FLASK_DEBUG=0 \
          BLOB_SALT=$(python -c "import secrets; print(secrets.token_hex(32))") \
          uv run python -m encrypted_blob_server.app &
          echo $! > server.pid
          sleep 2

      - name: Start server (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:BLOB_SALT = python -c "import secrets; print(secrets.token_hex(32))"
          $job = Start-Job -ScriptBlock {
            Set-Location $using:PWD
            $env:BLOB_SALT = $using:env:BLOB_SALT
            $env:FLASK_DEBUG = "0"
            uv run python -m encrypted_blob_server.app
          }
          $job.Id | Out-File -FilePath server.job
          # Wait until the port is actually accepting connections
          $timeout = 30
          $elapsed = 0
          while ($elapsed -lt $timeout) {
            try {
              $tcp = [System.Net.Sockets.TcpClient]::new("127.0.0.1", 5000)
              $tcp.Close()
              break
            } catch {
              Start-Sleep -Seconds 1
              $elapsed++
            }
          }


      - run: uv run pytest tests/test_integration.py -v
        env:
          BASE_URL: http://127.0.0.1:5000

      - name: Stop server (unix)
        if: always() && runner.os != 'Windows'
        run: kill $(cat server.pid)

      - name: Stop server (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: Stop-Job -Id (Get-Content server.job)